<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>College Attendance Management System - Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="login-container">
      <div class="login-box">
        <h1>College Attendance System</h1>
        <div class="login-form">
          <div class="role-selection">
            <h3>Select Your Role</h3>
            <div class="role-buttons">
              <button id="teacherLogin" class="role-btn teacher-btn">
                Teacher Login
              </button>
              <button id="studentLogin" class="role-btn student-btn">
                Student Login
              </button>
            </div>
          </div>

          <div id="loginForm" class="login-form-section" style="display: none">
            <h3 id="formTitle">Login</h3>
            <form id="authForm">
              <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required />
              </div>
              <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required />
              </div>
              <button type="submit" class="login-btn">Login</button>
            </form>
          </div>

          <div
            id="errorMessage"
            class="error-message"
            style="display: none"
          ></div>
        </div>
      </div>
    </div>

    <!-- API Client must be loaded first -->
    <script src="api-client.js"></script>
    <script src="script.js"></script>
  </body>
</html>
